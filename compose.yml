services:
  account_microservice:
    build:
      context: ./account
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://account_db:3306/accountdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: accountdb
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin
    depends_on:
      account_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - david-net

  client_microservice:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://client_db:3306/clientdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: clientdb
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin
    depends_on:
      client_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - david-net

  account_db:
    image: "mysql:8.0.44"
    environment:
      MYSQL_DATABASE: accountdb
      MYSQL_ROOT_PASSWORD: accountdb
    volumes:
      - account_db_data:/var/lib/mysql
      - ./account/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - david-net

  client_db:
    image: "mysql:8.0.44"
    environment:
      MYSQL_DATABASE: clientdb
      MYSQL_ROOT_PASSWORD: clientdb
    volumes:
      - client_db_data:/var/lib/mysql
      - ./client/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - david-net

  rabbitmq:
    image: "rabbitmq:latest"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - david-net

networks:
  david-net:
    driver: bridge

volumes:
  account_db_data:
  client_db_data:
